{% extends 'base.html' %}

{% block title %}Login — Artigo{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Welcome Back</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Login</button>
    </form>
    <p class="form-link">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
</div>
{% endblock %}
