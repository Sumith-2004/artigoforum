{% extends 'base.html' %}

{% block title %}Sign Up — Artigo{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Create Account</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Sign Up</button>
    </form>
    <p class="form-link">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
